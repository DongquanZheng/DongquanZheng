<svg width="1400" height="360" viewBox="0 0 1400 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Dongquan Zheng signal lab banner</title>
  <desc id="desc">A dark cyber research-lab banner with terminal typography, a polished network radar, and minimal node labels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050A0F"/>
      <stop offset="0.48" stop-color="#08131B"/>
      <stop offset="1" stop-color="#100F17"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(520 174) rotate(90) scale(190 410)">
      <stop stop-color="#34D399" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="radarGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1044 178) rotate(90) scale(210 250)">
      <stop stop-color="#7DD3FC" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="900" y1="54" x2="1218" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC" stop-opacity="0"/>
      <stop offset="0.48" stop-color="#7DD3FC" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#8BA3B7" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="360" rx="18" fill="url(#bg)"/>
  <rect width="1400" height="360" rx="18" fill="url(#grid)"/>
  <rect width="1400" height="360" rx="18" fill="url(#centerGlow)"/>

  <g transform="translate(700 180) scale(1.075) translate(-700 -180)">
  <rect x="18" y="18" width="1364" height="324" rx="14" stroke="#6EE7B7" stroke-opacity="0.18"/>
  <rect x="42" y="40" width="1316" height="280" rx="9" stroke="#60A5FA" stroke-opacity="0.12"/>

  <g text-anchor="middle">
    <text x="525" y="82" fill="#34D399" font-family="Consolas, 'Liberation Mono', monospace" font-size="31" letter-spacing="9">SIGNAL LAB</text>
    <text x="525" y="158" fill="#F4FAFF" font-family="Consolas, 'Liberation Mono', monospace" font-size="52" font-weight="700" letter-spacing="2">DONGQUAN ZHENG</text>
    <text x="525" y="205" fill="#7DD3FC" font-family="Consolas, 'Liberation Mono', monospace" font-size="24">ML / NLP / NETWORK INTELLIGENCE / LANTF</text>
    <text x="525" y="250" fill="#8BFFF0" font-family="Consolas, 'Liberation Mono', monospace" font-size="20">sense -> model -> predict</text>
  </g>

  <g opacity="0.32" stroke="#6EE7B7" stroke-linecap="round">
    <path d="M110 84H220"/>
    <path d="M132 258H262"/>
    <path d="M706 82H820"/>
    <path d="M690 256H828"/>
  </g>

  <g transform="translate(1044 178)">
    <circle r="170" fill="url(#radarGlow)"/>
    <circle r="150" stroke="#6EE7B7" stroke-opacity="0.20"/>
    <circle r="108" stroke="#7DD3FC" stroke-opacity="0.16"/>
    <circle r="68" stroke="#6EE7B7" stroke-opacity="0.23"/>
    <path d="M-150 0H150M0 -150V150" stroke="#7DD3FC" stroke-opacity="0.10"/>
    <path d="M-166 -122L170 78L170 -122Z" fill="url(#beam)" opacity="0.30"/>

    <path d="M-118 58C-78 -6 -32 -72 24 -84C84 -98 130 -42 134 20C140 78 82 104 24 76C-24 54 -42 8 -80 -14C-112 -31 -140 12 -118 58Z" stroke="#7DD3FC" stroke-opacity="0.35"/>
    <path d="M-114 58L-58 -16L-2 20L56 -70L120 26L70 78L-2 20L-58 -16" stroke="#7DD3FC" stroke-width="2.3" stroke-opacity="0.82"/>
    <path d="M-58 -16L-14 -84L56 -70M-2 20L28 92L70 78M-114 58L-140 96M120 26L152 56" stroke="#34D399" stroke-width="1.8" stroke-opacity="0.60"/>

    <g filter="url(#glow)">
      <circle cx="-114" cy="58" r="6" fill="#E5EEF7"/>
      <circle cx="-58" cy="-16" r="6" fill="#E5EEF7"/>
      <circle cx="-14" cy="-84" r="5" fill="#E5EEF7"/>
      <circle cx="-2" cy="20" r="8" fill="#E5EEF7"/>
      <circle cx="28" cy="92" r="5" fill="#E5EEF7"/>
      <circle cx="56" cy="-70" r="6" fill="#E5EEF7"/>
      <circle cx="70" cy="78" r="5" fill="#E5EEF7"/>
      <circle cx="120" cy="26" r="6" fill="#E5EEF7"/>
    </g>

    <g font-family="Consolas, 'Liberation Mono', monospace" font-size="14" fill="#6EE7B7">
      <text x="-158" y="79">ports</text>
      <text x="66" y="-86">events</text>
      <text x="98" y="52">risk</text>
      <text x="-3" y="124" text-anchor="middle">LANTF</text>
    </g>
  </g>

  <g opacity="0.42" stroke-linecap="round">
    <path d="M168 206C176 187 184 225 192 206C200 187 208 225 216 206C224 187 232 225 240 206" stroke="#6EE7B7"/>
    <path d="M738 128H812M758 158H834M724 188H800" stroke="#7DD3FC"/>
    <path d="M1228 242V218M1246 242V202M1264 242V228M1282 242V192" stroke="#6EE7B7" stroke-width="3"/>
    <path d="M1218 242H1292" stroke="#7DD3FC" stroke-opacity="0.42"/>
  </g>
  </g>
</svg>
